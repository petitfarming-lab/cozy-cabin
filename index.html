<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>감성숙소 지도</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #f7f5f2;
      color: #2d2d2d;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #sidebar {
      width: 360px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-right: 1px solid #e8e4df;
      z-index: 10;
    }

    #header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid #f0ece8;
    }

    #header h1 { font-size: 18px; font-weight: 700; color: #3a3a3a; margin-bottom: 4px; letter-spacing: -0.3px; }
    #header p  { font-size: 12px; color: #999; }

    #search-area {
      padding: 16px 24px;
      border-bottom: 1px solid #f0ece8;
    }

    #search-row { display: flex; gap: 8px; }

    #keyword {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e0dbd5;
      border-radius: 10px;
      font-size: 14px;
      background: #faf9f7;
      outline: none;
      transition: border-color 0.2s;
    }
    #keyword:focus { border-color: #7a9e7e; }
    #keyword::placeholder { color: #bbb; }

    #search-btn {
      padding: 10px 16px;
      background: #5c7a5e;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #search-btn:hover { background: #4a6a4c; }

    #tag-row { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }

    .tag {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #ddd;
      font-size: 11px;
      color: #777;
      cursor: pointer;
      background: #faf9f7;
      transition: all 0.15s;
    }
    .tag:hover { border-color: #7a9e7e; color: #5c7a5e; background: #f0f5f0; }

    #result-header { padding: 12px 24px 8px; font-size: 12px; color: #999; display: none; }

    #result-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px;
    }
    #result-list::-webkit-scrollbar { width: 4px; }
    #result-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .place-card {
      padding: 14px 12px;
      border-radius: 12px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: background 0.15s;
      border: 1.5px solid transparent;
    }
    .place-card:hover  { background: #f7f5f2; border-color: #e0dbd5; }
    .place-card.active { background: #f0f5f0; border-color: #7a9e7e; }

    .card-num {
      display: inline-block;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #5c7a5e;
      color: #fff;
      font-size: 10px; font-weight: 700;
      text-align: center; line-height: 20px;
      margin-right: 8px; flex-shrink: 0;
    }

    .card-top  { display: flex; align-items: center; margin-bottom: 5px; }
    .card-name { font-size: 14px; font-weight: 600; color: #2d2d2d; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-addr { font-size: 11px; color: #999; padding-left: 28px; margin-bottom: 6px; line-height: 1.4; }
    .card-link {
      display: inline-block;
      margin-left: 28px;
      padding: 3px 10px;
      border-radius: 6px;
      background: #f0f5f0;
      color: #5c7a5e;
      font-size: 11px; font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }
    .card-link:hover { background: #d8e8d8; }

    #status { padding: 40px 24px; text-align: center; color: #bbb; font-size: 13px; line-height: 1.8; }
    #status .icon { font-size: 32px; margin-bottom: 10px; }

    #loading { display: none; padding: 20px 24px; text-align: center; color: #999; font-size: 13px; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #e0dbd5;
      border-top-color: #5c7a5e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #map { flex: 1; }

    /* Leaflet 팝업 커스텀 */
    .popup-name { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
    .popup-addr { font-size: 11px; color: #888; margin-bottom: 6px; }
    .popup-link { font-size: 11px; color: #5c7a5e; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="header">
    <h1>🌿 감성숙소 지도</h1>
    <p>지역 이름으로 감성 숙소를 찾아보세요</p>
  </div>

  <div id="search-area">
    <div id="search-row">
      <input id="keyword" type="text" placeholder="지역명 입력 (예: 구례, 강릉, 제주)" />
      <button id="search-btn" onclick="search()">검색</button>
    </div>
    <div id="tag-row">
      <span class="tag" onclick="quickSearch('구례')">구례</span>
      <span class="tag" onclick="quickSearch('강릉')">강릉</span>
      <span class="tag" onclick="quickSearch('제주')">제주</span>
      <span class="tag" onclick="quickSearch('가평')">가평</span>
      <span class="tag" onclick="quickSearch('경주')">경주</span>
      <span class="tag" onclick="quickSearch('여수')">여수</span>
      <span class="tag" onclick="quickSearch('통영')">통영</span>
      <span class="tag" onclick="quickSearch('속초')">속초</span>
    </div>
  </div>

  <div id="loading"><div class="spinner"></div>검색 중...</div>
  <div id="result-header"></div>
  <div id="result-list">
    <div id="status">
      <div class="icon">🗺️</div>
      지역 이름을 검색하면<br/>감성 숙소가 지도에 표시돼요
    </div>
  </div>
  <div id="blog-section" style="display:none; padding:12px; border-top:1px solid #f0ece8;">
    <div style="font-size:11px;color:#999;margin-bottom:8px;">📝 참고한 블로그</div>
    <div id="blog-list"></div>
  </div>
</div>

<div id="map"></div>

<script>
  const map = L.map('map').setView([36.5, 127.5], 7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  const greenIcon = L.divIcon({
    className: '',
    html: `<div style="
      width:28px;height:28px;border-radius:50% 50% 50% 0;
      background:#5c7a5e;border:2px solid #fff;
      box-shadow:0 2px 6px rgba(0,0,0,0.3);
      transform:rotate(-45deg)">
    </div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 28],
    popupAnchor: [0, -30]
  });

  let markers = [];
  let activeCard = null;

  document.getElementById('keyword').addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });

  function quickSearch(place) {
    document.getElementById('keyword').value = place;
    search();
  }

  async function search() {
    const kw = document.getElementById('keyword').value.trim();
    if (!kw) return;

    clearMarkers();
    document.getElementById('result-list').innerHTML = '';
    document.getElementById('result-header').style.display = 'none';
    document.getElementById('blog-section').style.display = 'none';
    document.getElementById('loading').style.display = 'block';

    try {
      const res = await fetch(`/search?q=${encodeURIComponent(kw)}`);
      const data = await res.json();
      document.getElementById('loading').style.display = 'none';

      if (data.places && data.places.length > 0) {
        showResults(data.places);
        showBlogs(data.blogs || []);
      } else {
        document.getElementById('result-list').innerHTML = `
          <div id="status"><div class="icon">🔍</div>블로그에서 숙소를 찾지 못했어요<br/>다른 지역명을 입력해보세요</div>`;
      }
    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('result-list').innerHTML = `
        <div id="status"><div class="icon">⚠️</div>오류가 발생했어요<br/>서버가 실행 중인지 확인해보세요</div>`;
    }
  }

  function showBlogs(blogs) {
    if (!blogs.length) return;
    const blogList = document.getElementById('blog-list');
    blogList.innerHTML = blogs.map(b => `
      <a href="${b.link}" target="_blank" style="
        display:block; padding:6px 0;
        font-size:11px; color:#5c7a5e;
        text-decoration:none; border-bottom:1px solid #f5f3f0;
        white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
        ${b.blogger ? `<span style="color:#bbb">${b.blogger} · </span>` : ''}${b.title}
      </a>`).join('');
    document.getElementById('blog-section').style.display = 'block';
  }

  function showResults(places) {
    const bounds = [];
    const list = document.getElementById('result-list');
    list.innerHTML = '';

    const header = document.getElementById('result-header');
    header.style.display = 'block';
    header.textContent = `블로그에서 찾은 숙소 ${places.length}곳`;

    places.forEach((place, i) => {
      const lat = place.lat;
      const lng = place.lng;

      const marker = L.marker([lat, lng], { icon: greenIcon }).addTo(map);
      const popupHtml = `
        <div class="popup-name">${place.name}</div>
        <div class="popup-addr">${place.address}</div>
        <a class="popup-link" href="${place.url}" target="_blank">카카오맵에서 보기 →</a>`;

      marker.bindPopup(popupHtml, { maxWidth: 220 });
      marker.on('click', () => highlightCard(i));
      markers.push(marker);
      bounds.push([lat, lng]);

      const card = document.createElement('div');
      card.className = 'place-card';
      card.id = `card-${i}`;
      card.innerHTML = `
        <div class="card-top">
          <span class="card-num">${i + 1}</span>
          <span class="card-name">${place.name}</span>
        </div>
        <div class="card-addr">${place.address}</div>
        <a class="card-link" href="${place.url}" target="_blank">카카오맵 보기 →</a>`;

      card.addEventListener('click', () => {
        map.setView([lat, lng], 14);
        marker.openPopup();
        highlightCard(i);
      });

      list.appendChild(card);
    });

    if (bounds.length > 0) map.fitBounds(bounds, { padding: [40, 40] });
  }

  function highlightCard(index) {
    if (activeCard !== null) document.getElementById(`card-${activeCard}`)?.classList.remove('active');
    document.getElementById(`card-${index}`)?.classList.add('active');
    document.getElementById(`card-${index}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    activeCard = index;
  }

  function clearMarkers() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    activeCard = null;
  }
</script>
</body>
</html>
